name: Release Connector Image
on:
  push:
    branches:
      - main

jobs:
  infra-scan:
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    uses: notdodo/github-actions/.github/workflows/infra-security-scan.yml@infra-scan-v0

  python-ci:
    permissions:
      contents: read
    uses: notdodo/github-actions/.github/workflows/python-ci.yml@python-ci-v0
    with:
      working-directory: '.'

  build-docker-image:
    needs: [infra-scan, python-ci]
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write
    uses: notdodo/github-actions/.github/workflows/docker-build-and-push.yml@docker-build-and-push-v0
    with:
      registry: docker.io
      image: digintlab/opencti-connector
      platforms: linux/amd64,linux/arm64
      tags: |
        type=raw,value=latest
        type=sha
      egress-policy-allowlist: >
        deb.debian.org:443
        deb.debian.org:80
        files.pythonhosted.org:443
        pypi.org:443
      push: true
      sign-image: false
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  sign-image:
    needs: [build-docker-image]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      - name: Sign and verify
        env:
          COSIGN_YES: 'true'
          IMAGE_NAME: docker.io/digintlab/opencti-connector
          IMAGE_DIGEST: ${{ needs.build-docker-image.outputs.image_digest }}
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
          CERT_IDENTITY: ${{ format('https://github.com/{0}', github.workflow_ref) }}
          SIGNER_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          # Docker Hub can lag before a newly pushed signature is queryable.
          for i in 1 2 3; do
            cosign sign -a signer_workflow_ref="${SIGNER_WORKFLOW_REF}" "${IMAGE_REF}" && break
            if [ "$i" -eq 3 ]; then
              exit 1
            fi
            sleep $((i * 5))
          done
      - name: Debug cosign data
        if: failure()
        env:
          IMAGE_NAME: docker.io/digintlab/opencti-connector
          IMAGE_DIGEST: ${{ needs.build-docker-image.outputs.image_digest }}
        run: |
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          echo "Debug image ref: ${IMAGE_REF}"
          echo "Cosign tree:"
          cosign tree "${IMAGE_REF}" || true
          echo "Cosign verify (unfiltered):"
          cosign verify "${IMAGE_REF}" || true
          for i in 1 2 3 4 5; do
            if cosign verify \
              -a signer_workflow_ref="${SIGNER_WORKFLOW_REF}" \
              --certificate-identity "${CERT_IDENTITY}" \
              --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" \
              "${IMAGE_REF}"; then
              exit 0
            fi
            if [ "$i" -eq 5 ]; then
              echo "Verification failed after retries"
              exit 1
            fi
            sleep $((i * 5))
          done
